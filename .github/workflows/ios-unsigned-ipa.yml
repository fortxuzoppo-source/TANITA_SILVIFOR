name: Build unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build SilviForTANITA unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: IOS/package-lock.json

      - name: Install Capacitor dependencies
        working-directory: IOS
        run: npm ci

      - name: Prepare mobile web files
        working-directory: IOS
        run: |
          set -euo pipefail
          rm -rf mobile-www
          mkdir -p mobile-www
          cp ../PC/SilviForTANITA/index.html mobile-www/
          cp ../PC/SilviForTANITA/README.md mobile-www/
          cp -R ../PC/SilviForTANITA/assets mobile-www/assets

      - name: Sync Capacitor iOS project
        working-directory: IOS
        run: npx cap sync ios

      - name: Resolve Xcode packages
        working-directory: IOS
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project App/App.xcodeproj \
            -scheme App

      - name: Build unsigned iPhone app
        working-directory: IOS
        run: |
          set -euo pipefail
          xcodebuild \
            -project App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package unsigned IPA
        working-directory: IOS
        run: |
          set -euo pipefail
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          rm -rf Payload SilviForTANITA-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/SilviForTANITA.app
          /usr/bin/zip -qry SilviForTANITA-unsigned.ipa Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SilviForTANITA-unsigned-ipa
          path: IOS/SilviForTANITA-unsigned.ipa
          if-no-files-found: error
